<div class="bg-card border border-border rounded-2xl p-5 transition-all"
     [class]="hoverClass">
  <div class="text-2xl mb-2">{{ icon }}</div>
  <div class="font-display text-3xl font-bold" [class]="valueClass">
    {{ value }}
  </div>
  <div class="text-muted text-xs font-body mt-1 uppercase tracking-widest">
    {{ label }}
  </div>
</div>
