<div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
  <div [class]="borderClass"
       class="bg-card border rounded-2xl p-7 w-full max-w-lg mx-4">

    <div class="flex items-center justify-between mb-6">
      <h2 [class]="titleClass" class="font-display text-xl tracking-wide">
        {{ title }}
      </h2>
      <button (click)="close.emit()"
              class="text-muted hover:text-white transition-colors font-display text-lg leading-none">
        ✕
      </button>
    </div>

    <ng-content />

  </div>
</div>
