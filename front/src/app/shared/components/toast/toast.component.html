@if (visible) {
  <div class="fixed bottom-6 right-6 z-50 flex items-center gap-3 px-5 py-3 bg-card border rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.4)] font-body text-sm animate-[fadeInUp_0.3s_ease]"
       [class]="classes">
    <span>{{ icon }}</span>
    <span>{{ message }}</span>
    <button (click)="visible = false; dismissed.emit()"
            class="ml-2 opacity-60 hover:opacity-100 transition-opacity">
      ✕
    </button>
  </div>
}
