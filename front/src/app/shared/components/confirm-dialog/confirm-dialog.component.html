<div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-card border border-danger/30 rounded-2xl p-7 w-full max-w-sm mx-4 shadow-[0_0_40px_rgba(255,59,92,0.1)]">

    <h2 class="font-display text-lg text-danger tracking-wide mb-3">
      {{ title }}
    </h2>
    <p class="text-muted text-sm font-body mb-6">{{ message }}</p>

    <div class="flex justify-end gap-3">
      <button (click)="cancel.emit()"
              class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-muted/10 border border-muted/40 text-muted hover:bg-muted/20 transition-all">
        {{ cancelLabel }}
      </button>
      <button (click)="confirm.emit()"
              class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-danger/10 border border-danger/60 text-danger hover:bg-danger/20 transition-all">
        {{ confirmLabel }}
      </button>
    </div>

  </div>
</div>
