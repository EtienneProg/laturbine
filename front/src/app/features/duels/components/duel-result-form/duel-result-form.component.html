<div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">

  <div class="bg-card border border-green/30 rounded-2xl p-7 w-full max-w-md shadow-[0_0_40px_rgba(0,255,136,0.1)] mx-4">

    <h2 class="font-display text-xl text-green tracking-wide drop-shadow-[0_0_12px_rgba(0,255,136,0.4)] mb-2">
      🏆 RÉSULTAT DU DUEL
    </h2>
    <p class="text-muted text-sm font-body mb-6">
      Sélectionne l'équipe gagnante
    </p>

    <div class="grid grid-cols-2 gap-4 mb-6">

      @for (team of duel.teams; track team.id; let i = $index) {
        <button
          (click)="select(team.id)"
          [class]="selected() === team.id
            ? (i === 0
                ? 'w-full p-4 rounded-xl border-2 border-neon bg-neon/20 transition-all'
                : 'w-full p-4 rounded-xl border-2 border-purple bg-purple/20 transition-all')
            : 'w-full p-4 rounded-xl border border-border bg-bg hover:border-white/20 transition-all'"
        >
          <div class="text-xs font-display tracking-widest mb-2"
               [class]="selected() === team.id
                 ? (i === 0 ? 'text-neon' : 'text-purple')
                 : 'text-muted'">
            ÉQUIPE {{ i + 1 }}
          </div>
          @for (TeamPlayer of team.players; track TeamPlayer.player.id) {
            <div class="font-body text-sm font-semibold text-white">
              {{ TeamPlayer.player.name }}
            </div>
          }
          @if (selected() === team.id) {
            <div class="text-green text-xs mt-2 font-display">🏆 GAGNANT</div>
          }
        </button>
      }

    </div>

    <div class="flex justify-end gap-3">
      <button
        (click)="cancel.emit()"
        class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-danger/10 border border-danger/60 text-danger hover:bg-danger/20 transition-all"
      >
        Annuler
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="selected() === null"
        class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-green/10 border border-green/60 text-green hover:bg-green/20 hover:shadow-neon-green disabled:opacity-30 disabled:cursor-not-allowed transition-all"
      >
        ✅ Confirmer
      </button>
    </div>

  </div>
</div>
