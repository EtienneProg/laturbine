<div class="grid grid-cols-[48px_2fr_1fr_1fr_1fr_3fr] items-center px-5 py-4 border-b border-border last:border-0 hover:bg-white/[0.02] transition-colors">

  <!-- Rang -->
  <div class="font-display text-sm" [class]="rankClass">
    {{ medal || ('#' + rank) }}
  </div>

  <!-- Nom -->
  <div class="font-body text-sm font-semibold text-white">
    {{ player.name }}
  </div>

  <!-- ELO -->
  <div class="font-display text-sm font-bold"
       [class]="rank === 1 ? 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.5)]'
              : rank === 2 ? 'text-gray-400'
              : rank === 3 ? 'text-amber-600'
              : 'text-green drop-shadow-[0_0_8px_rgba(0,255,136,0.3)]'">
    {{ player.elo }}
  </div>

  <!-- Victoires -->
  <div class="font-body text-sm text-green">{{ player.wins }}</div>

  <!-- Défaites -->
  <div class="font-body text-sm text-danger">{{ player.losses }}</div>

  <!-- Barre de progression -->
  <div class="flex items-center gap-3">
    <div class="flex-1 h-1.5 bg-border rounded-full overflow-hidden">
      <div class="h-full rounded-full transition-all duration-500"
           [class]="barColor"
           [style.width]="barWidth">
      </div>
    </div>
    <span class="font-body text-xs text-muted w-8 text-right">
      {{ winRate }}
    </span>
  </div>

</div>
