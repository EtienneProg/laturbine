<div class="h-screen min-[1568px]:overflow-hidden max-[1567px]:h-max
            bg-gradient-to-br from-purple-700 via-purple-800 to-purple-900
            flex items-center justify-center">

  <div class="p-8 max-[428px]:px-2 w-screen h-screen max-[1567px]:h-max box-border bg-cover bg-center"
       style="background-image: url('https://lh3.googleusercontent.com/p/AF1QipPoJU8K0BIfOFuiSwLFmnAH_nyq0xHyh6v8hiXS=s1360-w1360-h1020-rw')">

    <div class="flex max-[1567px]:flex-col h-full w-full gap-10">

      <!-- ═══════════════════════════════ -->
      <!-- LEADERBOARD 2/3               -->
      <!-- ═══════════════════════════════ -->
      <div class="w-2/3 h-full max-[1567px]:w-full max-[1567px]:h-max">
        <div class="relative w-full h-full max-[1567px]:h-max rounded-3xl
                    bg-[#1b0f2f]/90 backdrop-blur-xl px-10 max-[492px]:px-2 py-6
                    neon-frame flex flex-col">

          <span class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-purple-400"></span>
          <span class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-purple-400"></span>
          <span class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-purple-400"></span>
          <span class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-purple-400"></span>

          <h1 class="h-max py-2 text-center text-5xl max-[1567px]:text-4xl max-[405px]:text-2xl
                     text-white font-extrabold tracking-widest"
              style="filter: drop-shadow(0 0 15px #a855f7)">
            TOP 10 LEADERBOARD
          </h1>

          <div class="h-full w-full bg-center bg-no-repeat"
               style="background-image: url('/images/logo-game-center-la-turbine.png'); background-size: 60%">
            <table class="w-full h-full border-separate border-spacing-y-[1vh]">
              <tbody>
                @for (player of top10; track player.id; let i = $index) {
                  <tr app-lb-player-row
                      [player]="player"
                      [rank]="i + 1"
                      [grade]="getGrade(player.elo)"
                      [lastMatch]="getLastMatch(player.id)">
                  </tr>
                }
                @for (rank of emptyRanks; track rank) {
                  <tr app-lb-empty-row [rank]="rank"></tr>
                }
              </tbody>
            </table>
          </div>

        </div>
      </div>

      <!-- ═══════════════════════════════ -->
      <!-- DROITE 1/3                     -->
      <!-- ═══════════════════════════════ -->
      <div class="flex flex-col max-[1567px]:flex-row max-[1200px]:flex-col
                  max-[1567px]:w-full w-1/3 h-full gap-6">

        <!-- DUELS -->
        <div class="relative w-full h-2/3 max-[1567px]:h-full rounded-3xl
                    bg-[#1b0f2f]/90 backdrop-blur-xl px-6 py-6 neon-frame flex flex-col">

          <span class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-cyan-400"></span>
          <span class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-cyan-400"></span>
          <span class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-cyan-400"></span>
          <span class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-cyan-400"></span>

          <h2 class="text-center text-4xl text-white font-extrabold tracking-widest mb-6"
              style="filter: drop-shadow(0 0 15px #22d3ee)">
            ⚔️ DUELS ⚔️
          </h2>

          <div class="flex flex-col gap-2 h-full px-2 pb-2">
            @for (slot of duelSlots(); track slot.game.id) {
              <app-lb-duel-slot [slot]="slot" />
            }
          </div>

        </div>

        <!-- PUB -->
        <div class="h-1/3 w-full max-[1567px]:h-auto">
          <div class="relative w-full h-full rounded-3xl bg-[#1b0f2f]/90 backdrop-blur-xl
                      p-6 neon-frame flex flex-col justify-between items-center text-center">

            <span class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-cyan-400"></span>
            <span class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-cyan-400"></span>
            <span class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-cyan-400"></span>
            <span class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-cyan-400"></span>

            <h3 class="text-white text-2xl font-extrabold tracking-widest"
                style="filter: drop-shadow(0 0 10px #22d3ee)">
              🔥 REJOINS LA COMMUNAUTÉ 🔥
            </h3>

            <div class="flex max-[683px]:flex-col h-full w-full justify-center items-center p-2 gap-6">
              <div class="relative h-[80%] max-[1200px]:h-60 aspect-square p-1 rounded-2xl
                          bg-black/40 border-2 border-purple-400 flex justify-center items-center"
                   style="box-shadow: 0 0 20px #a855f7">
                <span class="w-full h-full bg-cover bg-center"
                      style="background-image: url('/images/QR-Invitation.png')"></span>
              </div>
              <div class="relative h-[80%] max-[1200px]:h-60 w-full p-1 rounded-2xl
                          flex justify-center items-center bg-white/40 border-2 border-purple-400"
                   style="box-shadow: 0 0 20px #a855f7">
                <span class="w-full h-full bg-contain bg-center bg-no-repeat"
                      style="background-image: url('/images/logo-game-center-la-turbine.png'); background-size: 80%"></span>
              </div>
            </div>

            <p class="text-pink-400 font-extrabold tracking-wide uppercase text-xs">
              Les DUELS sont uniquement pendant le Laser Game illimité
            </p>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
