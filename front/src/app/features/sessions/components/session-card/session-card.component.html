<div [class]="borderClass"
     class="bg-card border rounded-2xl p-5 transition-all">

  <div class="flex items-center justify-between flex-wrap gap-4" >

    <div (click)="viewRegistrations.emit(session)" class="flex-1 cursor-pointer">
      <div class="flex items-center gap-3 mb-2">
        <span [class]="statusClass"
              class="px-3 py-1 rounded-full text-xs font-body">
          {{ statusLabel }}
        </span>
        @if (session.status === 'ACTIVE') {
          <span class="text-xs font-display text-green animate-pulse">EN DIRECT</span>
        }
      </div>
      <div class="font-display text-lg text-white tracking-wide">
        {{ session.date | date:'EEEE d MMMM yyyy' | titlecase }}
      </div>
      <div class="text-muted text-xs font-body mt-1 hover:text-neon transition-colors">
        👥 {{ session.registrations.length }} inscrits — voir la liste
      </div>
    </div>

    <div class="flex items-center gap-2 flex-wrap">

      @if (session.status === 'OPEN') {
        <button (click)="activate.emit(session)"
                class="px-4 py-2 rounded-xl font-display text-xs tracking-widest bg-green/10 border border-green/60 text-green hover:bg-green/20 hover:shadow-neon-green transition-all cursor-pointer">
          ▶ Activer
        </button>
      }

      @if (session.status === 'ACTIVE') {
        <button (click)="close.emit(session)"
                class="px-4 py-2 rounded-xl font-display text-xs tracking-widest bg-muted/10 border border-muted/60 text-muted hover:bg-muted/20 transition-all cursor-pointer">
          ■ Clôturer
        </button>
      }

      @if (session.status !== 'ACTIVE') {
        <button (click)="delete.emit(session)"
                class="px-4 py-2 rounded-xl font-display text-xs tracking-widest bg-danger/10 border border-danger/60 text-danger hover:bg-danger/20 transition-all cursor-pointer">
          ✕
        </button>
      }

      <button (click)="manualRegister.emit(session)"
              class="px-4 py-2 rounded-xl font-display text-xs tracking-widest bg-purple/10 border border-purple/60 text-purple hover:bg-purple/20 transition-all">
        👤 Inscrire
      </button>

    </div>
  </div>
</div>
