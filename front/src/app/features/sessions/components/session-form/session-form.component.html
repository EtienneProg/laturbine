<div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-card border border-neon/30 rounded-2xl p-7 w-full max-w-md shadow-[0_0_40px_rgba(0,245,255,0.1)] mx-4">

    <h2 class="font-display text-xl text-neon tracking-wide mb-6">
      📅 NOUVELLE SESSION
    </h2>

    <div class="mb-6">
      <label class="block text-xs text-muted font-body uppercase tracking-widest mb-2">
        Date de la session
      </label>
      <input
        type="date"
        [ngModel]="date()"
        (ngModelChange)="date.set($event)"
        [min]="today"
        class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-white font-body text-sm outline-none focus:border-neon/60 focus:shadow-[0_0_12px_rgba(0,245,255,0.15)] transition-all"
      />
    </div>

    <p class="text-muted text-xs font-body mb-6">
      📣 Une annonce sera automatiquement postée sur Discord pour ouvrir les inscriptions.
    </p>

    <div class="flex justify-end gap-3">
      <button (click)="close.emit()"
              class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-danger/10 border border-danger/60 text-danger hover:bg-danger/20 transition-all">
        Annuler
      </button>
      <button (click)="onSubmit()"
              [disabled]="!date().trim()"
              class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-neon/10 border border-neon/60 text-neon hover:bg-neon/20 hover:shadow-neon disabled:opacity-30 disabled:cursor-not-allowed transition-all">
        ✅ Créer & annoncer
      </button>
    </div>

  </div>
</div>
