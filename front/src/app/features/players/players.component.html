<div class="p-8">

  <!-- Modal formulaire -->
  @if (showForm()) {
    <app-player-form
      [player]="editPlayer()"
      (save)="onSave($event)"
      (close)="showForm.set(false)"
    />
  }

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="font-display text-2xl font-bold text-neon drop-shadow-[0_0_16px_rgba(0,245,255,0.5)] tracking-wide">
        👥 Joueurs
      </h1>
      <p class="text-muted text-sm font-body mt-1">
        {{ players().length }} joueurs enregistrés
      </p>
    </div>
    <button
      (click)="openCreate()"
      class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-green/10 border border-green/60 text-green hover:bg-green/20 hover:shadow-neon-green transition-all"
    >
      + Ajouter un joueur
    </button>
  </div>

  <!-- Search -->
  <div class="relative mb-6">
    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm">🔍</span>
    <input
      (ngModelChange)="search.set($event)"
      [ngModel]="search()"
      class="w-full bg-card border border-border rounded-xl pl-10 pr-4 py-3 text-white font-body text-sm outline-none focus:border-neon/60 focus:shadow-[0_0_12px_rgba(0,245,255,0.15)] transition-all placeholder:text-muted"
      placeholder="Rechercher par pseudo ou Discord..."
      type="text"
    />
  </div>

  <!-- Loader -->
  @if (loading()) {
    <div class="flex items-center justify-center py-16">
      <div class="w-8 h-8 border-2 border-neon border-t-transparent rounded-full animate-spin"></div>
    </div>
  } @else {
    <app-player-table
      [players]="filtered()"
      (edit)="openEdit($event)"
      (delete)="onDeleteRequest($event)"
      (viewDetail)="onViewDetail($event)"
    />
  }

  @if (playerToDelete()) {
    <app-confirm-dialog
      title="Supprimer le joueur"
      [message]="'Es-tu sûr de vouloir supprimer ' + playerToDelete()!.name + ' ? Cette action est irréversible.'"
      confirmLabel="Supprimer"
      cancelLabel="Annuler"
      (confirm)="onDeleteConfirm()"
      (cancel)="playerToDelete.set(null)"
    />
  }

</div>
