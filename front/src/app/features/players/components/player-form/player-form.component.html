<div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
  <div class="bg-card border border-neon/30 rounded-2xl p-7 w-full max-w-md shadow-[0_0_40px_rgba(0,245,255,0.1)] mx-4">

    <h2 class="font-display text-xl text-neon tracking-wide mb-6">
      {{ isEdit ? '✏️ ÉDITER' : '👤 AJOUTER' }} UN JOUEUR
    </h2>

    <div class="flex flex-col gap-4 mb-6">

      <div>
        <label class="block text-xs text-muted font-body uppercase tracking-widest mb-2">
          Pseudo *
        </label>
        <input
          (ngModelChange)="name.set($event)"
          [ngModel]="name()"
          class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-white font-body text-sm outline-none focus:border-neon/60 focus:shadow-[0_0_12px_rgba(0,245,255,0.15)] transition-all placeholder:text-muted"
          placeholder="NomDuJoueur"
          type="text"
        />
      </div>

      <div>
        <label class="block text-xs text-muted font-body uppercase tracking-widest mb-2">
          Discord Tag
        </label>
        <input
          (ngModelChange)="discordTag.set($event)"
          [ngModel]="discordTag()"
          class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-white font-body text-sm outline-none focus:border-neon/60 focus:shadow-[0_0_12px_rgba(0,245,255,0.15)] transition-all placeholder:text-muted"
          placeholder="pseudo#0000"
          type="text"
        />
      </div>

      <div>
        <label class="block text-xs text-muted font-body uppercase tracking-widest mb-2">
          Discord ID
        </label>
        <input
          (ngModelChange)="discordId.set($event)"
          [ngModel]="discordId()"
          class="w-full bg-bg border border-border rounded-xl px-4 py-3 text-white font-body text-sm outline-none focus:border-neon/60 focus:shadow-[0_0_12px_rgba(0,245,255,0.15)] transition-all placeholder:text-muted"
          placeholder="123456789012345678"
          type="text"
        />
      </div>

    </div>

    <div class="flex justify-end gap-3">
      <button (click)="close.emit()"
              class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-danger/10 border border-danger/60 text-danger hover:bg-danger/20 transition-all">
        Annuler
      </button>
      <button (click)="onSubmit()"
              [disabled]="!name().trim()"
              class="px-5 py-2.5 rounded-xl font-display text-xs tracking-widest bg-green/10 border border-green/60 text-green hover:bg-green/20 hover:shadow-neon-green disabled:opacity-30 disabled:cursor-not-allowed transition-all">
        {{ isEdit ? '✅ Mettre à jour' : '➕ Ajouter' }}
      </button>
    </div>

  </div>
</div>
